version: "3.9"

services:
  # =======================
  # NGINX (Gateway + LB)
  # =======================
  nginx-tracking:
    image: nginx:latest
    container_name: nginx-tracking
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - realtime-gateway
      - tracking-service
      - simulator-service
    networks:
      - realtime-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.10"
          memory: 64M

  # =======================
  # Redis (Pub/Sub)
  # =======================
  redis-tracking:
    image: redis:7-alpine
    container_name: redis-tracking
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realtime-net
    volumes:
      - redis-data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
        reservations:
          cpus: "0.25"
          memory: 128M

  questdb:
    image: questdb/questdb:9.1.0
    container_name: questdb
    restart: unless-stopped
    networks:
      - realtime-net
    ports:
      - "9000:9000"   # HTTP API
      - "8812:8812"   # PostgreSQL Wire Protocol
      - "9009:9009"   # Line Protocol
      - "9003:9003"   # InfluxDB Line Protocol
    volumes:
      - questdb:/var/lib/questdb
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.50"
          memory: 2048M
        reservations:
          cpus: "1.00"
          memory: 1024M

  # =======================
  # Kafka
  # =======================
  kafka-service-10:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_HEAP_OPTS=-Xms512M -Xmx512M
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-service-10:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-service-10:9093
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.50"
          memory: 1536M
        reservations:
          cpus: "1.00"
          memory: 1024M
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - realtime-net

  # =======================
  # Kafka Exporter
  # =======================
  kafka-exporter-tracking:
    image: danielqsj/kafka-exporter
    container_name: kafka-exporter-tracking
    restart: unless-stopped
    networks:
      - realtime-net
    ports:
      - "9308:9308"
    command:
      - "--kafka.server=kafka-service-10:9092"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 64M
        reservations:
          cpus: "0.05"
          memory: 32M

  # =======================
  # Simulator Service
  # =======================
  simulator-service:
    image: maivanminh/simulator-service:1.0
    restart: unless-stopped
    environment:
      - TZ=UTC
      - KAFKA_BOOTSTRAP_SERVERS=kafka-service-10:9092
      - REDIS_HOST=redis-tracking
      - INSTANCE_ID=simulator-service
      - OTLP_METRICS_EXPORT_URL=http://otel-collector-tracking:4318/v1/metrics
      - OTLP_TRACING_EXPORT_URL=http://otel-collector-tracking:4318/v1/traces
    depends_on:
      kafka-service-10:
        condition: service_started
    ports:
      - "8082:8082"
    networks:
      - realtime-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
        reservations:
          cpus: "0.25"
          memory: 256M

  # =======================
  # Tracking Service
  # =======================
  tracking-service:
    image: maivanminh/tracking-service:1.0
    restart: unless-stopped
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka-service-10:9092
      - REDIS_HOST=redis-tracking
      - KAFKA_CONSUMER_GROUP_ID=tracking-service
      - KAFKA_CONSUMER_TOPIC=simulation
      - KAFKA_CONSUMER_NUM_WORKERS=10
      - KAFKA_CONSUMER_QUEUE_CAPACITY=10000
      - INSTANCE_ID=tracking-service
      - QUESTDB_SENDER_CONFIG=http::addr=questdb:9000;auto_flush=off;retry_timeout=10000;
      - QUESTDB_PG_HOST=questdb
      - QUESTDB_PG_PORT=8812
      - QUESTDB_DATABASE=qdb
      - QUESTDB_USERNAME=admin
      - QUESTDB_PASSWORD=quest
      - QUESTDB_TABLE=positions
      - QUESTDB_RETENTION_DAYS=7
      - OTLP_METRICS_EXPORT_URL=http://otel-collector-tracking:4318/v1/metrics
      - OTLP_TRACING_EXPORT_URL=http://otel-collector-tracking:4318/v1/traces
    networks:
      - realtime-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      questdb:
        condition: service_started
      kafka-service-10:
        condition: service_started
    ports:
      - "8081:8081"
    deploy:
      resources:
        limits:
          cpus: "2.50"
          memory: 2560M
        reservations:
          cpus: "1.50"
          memory: 1536M


  # =======================
  # Realtime Services
  # =======================
  realtime-gateway:
    image: maivanminh/realtime-gateway:1.0
    restart: unless-stopped
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka-service-10:9092
      - REDIS_HOST=redis-tracking
      - KAFKA_CONSUMER_GROUP_ID=realtime-gateway
      - KAFKA_CONSUMER_TOPIC=simulation
      - KAFKA_CONSUMER_NUM_WORKERS=10
      - KAFKA_CONSUMER_QUEUE_CAPACITY=10000
      - INSTANCE_ID=realtime-gateway
      - OTLP_METRICS_EXPORT_URL=http://otel-collector-tracking:4318/v1/metrics
      - OTLP_TRACING_EXPORT_URL=http://otel-collector-tracking:4318/v1/traces
    depends_on:
      kafka-service-10:
        condition: service_started
      redis-tracking:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - realtime-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2048M
        reservations:
          cpus: "1.00"
          memory: 1024M

  otel-collector-tracking:
    image: otel/opentelemetry-collector-contrib:0.82.0
    restart: always
    command:
      - --config=/etc/otelcol-contrib/otel-collector.yml
    volumes:
      - ./data/otel-collector.yml:/etc/otelcol-contrib/otel-collector.yml
    networks:
      - realtime-net
    ports:
      - "1888:1888" # pprof extension
      - "8888:8888" # Prometheus metrics exposed by the collector
      - "8889:8889" # Prometheus exporter metrics
      - "13133:13133" # health_check extension
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP http receiver
      - "55679:55679" # zpages extension
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 128M

  prometheus-tracking:
    container_name: prometheus-tracking
    image: prom/prometheus
    restart: always
    networks:
      - realtime-net
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --storage.tsdb.retention.size=8GB
    volumes:
      - ./data/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1536M
        reservations:
          cpus: "0.50"
          memory: 768M

  node-exporter-tracking:
    image: prom/node-exporter:latest
    container_name: node-exporter-tracking
    restart: always
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - realtime-net
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 64M
        reservations:
          cpus: "0.05"
          memory: 32M
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'

  grafana-tracking-tracking:
    container_name: grafana-tracking
    image: grafana/grafana
    restart: always
    volumes:
      - ./data/grafana-tracking-datasources.yml:/etc/grafana-tracking/provisioning/datasources/datasources.yml
      - grafana-tracking-data:/var/lib/grafana-tracking
    networks:
      - realtime-net
    ports:
      - "3000:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 128M

networks:
  realtime-net:
    driver: bridge

volumes:
  redis-data:
    driver: local
  kafka-data:
    driver: local
  nginx-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-tracking-data:
    driver: local
  questdb:
    driver: local