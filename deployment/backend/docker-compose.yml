version: "3.9"

services:
  # =======================
  # NGINX (Gateway + LB)
  # =======================
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/nginx/logs:/var/log/nginx
    depends_on:
      - realtime-1
      - realtime-2
    networks:
      - realtime-net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  # =======================
  # Redis (Pub/Sub)
  # =======================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realtime-net
    volumes:
      - ./data/redis:/data
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M

  questdb:
    image: questdb/questdb:9.1.0
    container_name: questdb
    restart: unless-stopped
    networks:
      - realtime-net
    ports:
      - "9000:9000"   # HTTP API
      - "8812:8812"   # PostgreSQL Wire Protocol
      - "9009:9009"   # Line Protocol
    volumes:
      - ./data/questdb:/var/lib/questdb
    deploy:
      resources:
        limits:
          cpus: "3.00"
          memory: 4G
        reservations:
          cpus: "1.50"
          memory: 3G

  # =======================
  # Kafka
  # =======================

  kafka-service-10:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_HEAP_OPTS=-Xms756M -Xmx756M
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-service-10:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-service-10:9093
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_NUM_PARTITIONS=3
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2560M
        reservations:
          cpus: "1.00"
          memory: 1536M
    volumes:
      - ./data/kafka:/var/lib/kafka/data
    networks:
      - realtime-net

  # =======================
  # Simulator Service
  # =======================
  simulator-service:
    image: maivanminh/simulator-service:1.0
    restart: unless-stopped
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka-service-10:9092
      - REDIS_HOST=redis
      - INSTANCE_ID=simulator-1
    depends_on:
      kafka-service-10:
        condition: service_started
    networks:
      - realtime-net
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 768M
        reservations:
          cpus: "0.50"
          memory: 512M


  # =======================
  # Tracking Service
  # =======================
  tracking-service:
    image: maivanminh/tracking-service:1.0
    restart: unless-stopped
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka-service-10:9092
      - REDIS_HOST=redis
      - INSTANCE_ID=tracking-1
      - QUESTDB_SENDER_CONFIG=http::addr=questdb:9000;auto_flush=off;retry_timeout=10000;
      - QUESTDB_PG_HOST=questdb
      - QUESTDB_PG_PORT=8812
      - QUESTDB_DATABASE=qdb
      - QUESTDB_USERNAME=admin
      - QUESTDB_PASSWORD=quest
      - QUESTDB_TABLE=positions
      - QUESTDB_RETENTION_DAYS=7
    networks:
      - realtime-net
    depends_on:
      questdb:
        condition: service_started
      kafka-service-10:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 1536M
        reservations:
          cpus: "1.00"
          memory: 768M

  # =======================
  # Realtime Services (x4)
  # =======================
  realtime-1:
    image: maivanminh/realtime-gateway:1.0
    restart: unless-stopped
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka-service-10:9092
      - REDIS_HOST=redis
      - INSTANCE_ID=realtime-1
    depends_on:
      kafka-service-10:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - realtime-net
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 1024M
        reservations:
          cpus: "1"
          memory: 512M

  realtime-2:
    image: maivanminh/realtime-gateway:1.0
    restart: unless-stopped
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka-service-10:9092
      - REDIS_HOST=redis
      - INSTANCE_ID=realtime-2
    depends_on:
      kafka-service-10:
          condition: service_started
      redis:
        condition: service_healthy
    networks:
      - realtime-net
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 1024M
        reservations:
          cpus: "1"
          memory: 512M


networks:
  realtime-net:
    driver: bridge