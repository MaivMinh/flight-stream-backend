version: "3.9"

services:
  # =======================
  # NGINX (Gateway + LB)
  # =======================
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - realtime-1
      - realtime-2
    networks:
      - realtime-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256m

  # =======================
  # Redis (Pub/Sub)
  # =======================
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - realtime-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256m

  questdb:
    image: questdb/questdb:9.1.0
    container_name: questdb
    ports:
      - "9000:9000"
      - "8812:8812"
      - "9009:9009"
    networks:
      - realtime-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1g

  # =======================
  # Kafka (KRaft)
  # =======================

  kafka-service-10:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_HEAP_OPTS=-Xms256M -Xmx512M
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-service-10:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-service-10:9093
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_NUM_PARTITIONS=2
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1g
    volumes:
      - ~/kafka-data:/var/lib/kafka/data
    networks:
      - realtime-net

  # =======================
  # Simulator Service
  # =======================
  simulator-service:
    image: simulator-service:1.0
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka-service-10:9092
      - REDIS_HOST=redis
      - INSTANCE_ID=rt-1
    ports:
      - "8082:8082"
    networks:
      - realtime-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512m


  # =======================
  # Tracking Service
  # =======================
  tracking-service:
    image: tracking-service:1.0
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka-service-10:9092
      - REDIS_HOST=redis
      - INSTANCE_ID=rt-1
      - QUESTDB_SENDER_CONFIG=http::addr=questdb:9000;auto_flush=off;retry_timeout=10000;
      - QUESTDB_PG_HOST=questdb
      - QUESTDB_PG_PORT=8812
      - QUESTDB_DATABASE=qdb
      - QUESTDB_USERNAME=admin
      - QUESTDB_PASSWORD=quest
      - QUESTDB_TABLE=positions
      - QUESTDB_RETENTION_DAYS=7
    ports:
      - "8081:8081"
    networks:
      - realtime-net
    depends_on:
      - questdb
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512m

  # =======================
  # Realtime Services (x4)
  # =======================
  realtime-1:
    image: realtime-gateway:1.0
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka-service-10:9092
      - REDIS_HOST=redis
      - INSTANCE_ID=rt-1
    networks:
      - realtime-net
    depends_on:
      - simulator-service
      - kafka-service-10
      - redis
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512m

  realtime-2:
    image: realtime-gateway:1.0
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka-service-10:9092
      - REDIS_HOST=redis
      - INSTANCE_ID=rt-2
    networks:
      - realtime-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512m


networks:
  realtime-net:
    driver: bridge
