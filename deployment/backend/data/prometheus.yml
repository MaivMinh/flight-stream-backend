global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector-tracking:8889']

  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['kafka-exporter-tracking:9308']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter-tracking:9100']