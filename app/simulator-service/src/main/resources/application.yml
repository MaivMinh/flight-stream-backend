spring:
  application:
    name: simulator-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health
  otlp:
    metrics:
      export:
        url: ${OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}
        step: 5s