server:
  port: 8080

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  application:
    name: realtime-gateway
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 2000
      repositories:
        enabled: false

kafka:
  consumer:
    group-id: realtime-gateway
    concurrency: 6
    max-poll-records: ${KAFKA_CONSUMER_MAX_POLL_RECORDS:300}

management:
  endpoints:
    web:
      exposure:
        include: health
  otlp: # Vì sẽ push metrics, traces qua cho Otel Collector nên ở đây phải là otlp.
    metrics:
      export:
        url: ${OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}
        step: 5s